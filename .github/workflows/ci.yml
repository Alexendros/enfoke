name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Lint ficheros Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: "**/*.md"

  link-check:
    name: Comprobar enlaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Comprobar enlaces en Markdown
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-loopback
            --exclude-mail
            '**/*.md'
          fail: true
